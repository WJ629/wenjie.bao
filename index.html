<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鲍文杰 · 小鲍</title>
    <style>
        /* ========== CSS Variables · 紫白主色 ========== */
        :root {
            --color-primary: #6C3B9A;
            --color-primary-light: #9B6FC0;
            --color-primary-dark: #4A2870;
            --color-accent: #D4A5F5;
            --color-accent-glow: rgba(108, 59, 154, 0.12);
            --color-bg: #F9F7FC;
            --color-bg-card: #FFFFFF;
            --color-text: #1E1A2A;
            --color-text-secondary: #4A3A5A;
            --color-text-muted: #7A6A8A;
            --color-border: rgba(108, 59, 154, 0.10);
            --color-shadow: rgba(108, 59, 154, 0.08);
            --radius: 20px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            --max-width: 1100px;
            --nav-height: 72px;
        }

        [data-theme="dark"] {
            --color-primary: #9B6FC0;
            --color-primary-light: #B892D4;
            --color-primary-dark: #6C3B9A;
            --color-accent: #D4A5F5;
            --color-bg: #0E0A16;
            --color-bg-card: #1A1424;
            --color-text: #EDE8F2;
            --color-text-secondary: #B8A8C8;
            --color-text-muted: #7A6A8A;
            --color-border: rgba(155, 111, 192, 0.15);
            --color-shadow: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            transition: background var(--transition), color var(--transition);
            padding-top: var(--nav-height);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--color-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-primary-light);
            border-radius: 10px;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 28px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-primary);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, var(--color-primary-light), transparent);
        }

        .section {
            padding: 64px 0 56px;
            border-bottom: 1px solid var(--color-border);
        }
        .section:last-of-type {
            border-bottom: none;
        }

        /* ========== Nav ========== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            z-index: 1000;
            background: rgba(249, 247, 252, 0.80);
            backdrop-filter: blur(16px) saturate(1.2);
            border-bottom: 1px solid var(--color-border);
            transition: all var(--transition);
            display: flex;
            align-items: center;
        }
        [data-theme="dark"] .navbar {
            background: rgba(14, 10, 22, 0.85);
        }

        .navbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 28px;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            color: var(--color-text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .navbar-brand .accent {
            color: var(--color-primary);
        }
        .navbar-brand .sub {
            font-weight: 400;
            font-size: 0.75rem;
            color: var(--color-text-muted);
            margin-left: 4px;
        }

        .navbar-links {
            display: flex;
            align-items: center;
            gap: 24px;
            list-style: none;
        }
        .navbar-links a {
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 450;
            transition: color var(--transition);
            position: relative;
            padding: 4px 0;
        }
        .navbar-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-primary);
            transition: width var(--transition);
        }
        .navbar-links a:hover {
            color: var(--color-text);
        }
        .navbar-links a:hover::after {
            width: 100%;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .navbar-actions button {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--color-text-secondary);
            transition: all var(--transition);
            padding: 6px;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar-actions button:hover {
            border-color: var(--color-primary);
            color: var(--color-text);
            transform: scale(1.05);
        }

        .nav-toggle {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
        }
        .nav-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--color-text);
            border-radius: 2px;
            transition: all var(--transition);
        }

        @media (max-width: 768px) {
            .nav-toggle {
                display: flex;
            }
            .navbar-links {
                position: absolute;
                top: var(--nav-height);
                left: 0;
                right: 0;
                flex-direction: column;
                background: var(--color-bg);
                border-bottom: 1px solid var(--color-border);
                padding: 24px 28px;
                gap: 18px;
                transform: translateY(-120%);
                opacity: 0;
                transition: all var(--transition);
                pointer-events: none;
                box-shadow: 0 16px 48px var(--color-shadow);
            }
            .navbar-links.open {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }
            .navbar-links a {
                font-size: 1rem;
            }
        }

        /* ========== Hero ========== */
        .hero {
            padding: 40px 0 32px;
            position: relative;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: center;
        }
        .hero-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .hero-name {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.0;
            color: var(--color-text);
        }
        .hero-name .highlight {
            color: var(--color-primary);
            position: relative;
            display: inline-block;
        }
        .hero-name .highlight::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 4px;
            width: 100%;
            height: 6px;
            background: var(--color-accent);
            opacity: 0.25;
            border-radius: 4px;
        }

        .hero-subtitle {
            font-size: 1.4rem;
            font-weight: 450;
            color: var(--color-text-secondary);
            margin-top: 8px;
        }
        .hero-subtitle .wave {
            display: inline-block;
            animation: wave 2.5s infinite;
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(14deg); }
            75% { transform: rotate(-8deg); }
        }

        .hero-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .hero-tags .tag {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 450;
            color: var(--color-text-secondary);
            transition: all var(--transition);
        }
        .hero-tags .tag:hover {
            border-color: var(--color-primary);
            color: var(--color-text);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--color-shadow);
        }
        .hero-tags .tag.primary {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }
        .hero-tags .tag.primary:hover {
            background: var(--color-primary-dark);
            border-color: var(--color-primary-dark);
        }

        .hero-contact {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .hero-contact a,
        .hero-contact button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
            background: var(--color-bg-card);
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }
        .hero-contact a:hover,
        .hero-contact button:hover {
            border-color: var(--color-primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px var(--color-shadow);
        }
        .hero-contact .primary {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }
        .hero-contact .primary:hover {
            background: var(--color-primary-dark);
            border-color: var(--color-primary-dark);
        }

        .hero-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .hero-visual .orb {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--color-accent), var(--color-primary-light));
            opacity: 0.20;
            position: absolute;
            filter: blur(70px);
            animation: orbFloat 8s ease-in-out infinite alternate;
        }
        @keyframes orbFloat {
            0% { transform: scale(0.9) translate(0, 0); opacity: 0.15; }
            100% { transform: scale(1.3) translate(-10px, 10px); opacity: 0.30; }
        }

        .hero-quote {
            position: relative;
            z-index: 1;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 32px 36px;
            max-width: 380px;
            box-shadow: 0 12px 40px var(--color-shadow);
            transition: all var(--transition);
        }
        .hero-quote:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 56px var(--color-shadow);
        }
        .hero-quote p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--color-text-secondary);
            font-style: italic;
        }
        .hero-quote .byline {
            margin-top: 14px;
            font-style: normal;
            font-weight: 500;
            color: var(--color-text);
            font-size: 0.85rem;
        }
        .hero-quote .byline span {
            color: var(--color-primary);
        }

        @media (max-width: 900px) {
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 32px;
            }
            .hero-name {
                font-size: 3rem;
            }
            .hero-subtitle {
                font-size: 1.2rem;
            }
            .hero-quote {
                max-width: 100%;
            }
            .hero-visual .orb {
                width: 180px;
                height: 180px;
            }
        }
        @media (max-width: 480px) {
            .hero-name {
                font-size: 2.4rem;
            }
            .hero-subtitle {
                font-size: 1rem;
            }
            .hero-contact a,
            .hero-contact button {
                padding: 6px 16px;
                font-size: 0.78rem;
            }
            .hero-quote {
                padding: 22px 20px;
            }
        }

        /* ========== Highlights ========== */
        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 16px;
        }
        .highlight-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 22px 16px;
            text-align: center;
            transition: all var(--transition);
        }
        .highlight-item:hover {
            transform: translateY(-5px);
            border-color: var(--color-primary);
            box-shadow: 0 8px 28px var(--color-shadow);
        }
        .highlight-item .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        .highlight-item .label {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            margin-top: 4px;
            font-weight: 450;
        }

        /* ========== Tabs ========== */
        .tabs-container {
            margin-top: 8px;
        }
        .tabs-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 14px;
            margin-bottom: 28px;
        }
        .tabs-nav button {
            background: none;
            border: none;
            padding: 8px 22px;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all var(--transition);
            font-family: var(--font-sans);
            border: 1px solid transparent;
        }
        .tabs-nav button:hover {
            color: var(--color-text);
            background: var(--color-bg-card);
            border-color: var(--color-border);
        }
        .tabs-nav button[aria-selected="true"] {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }
        [data-theme="dark"] .tabs-nav button[aria-selected="true"] {
            background: var(--color-primary-light);
            color: var(--color-text);
            border-color: var(--color-primary-light);
        }

        .tabs-panel {
            display: none;
            animation: fadeUp 0.35s ease;
        }
        .tabs-panel[aria-hidden="false"] {
            display: block;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== Cards ========== */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 28px 26px 24px;
            transition: all var(--transition);
            box-shadow: 0 2px 12px var(--color-shadow);
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px var(--color-shadow);
            border-color: var(--color-primary-light);
        }
        .card .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--color-text);
        }
        .card .card-desc {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            line-height: 1.7;
        }
        .card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }
        .card .card-tags .pill {
            background: var(--color-accent-glow);
            padding: 2px 14px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 450;
            color: var(--color-primary);
            border: 1px solid transparent;
        }
        [data-theme="dark"] .card .card-tags .pill {
            background: rgba(155, 111, 192, 0.15);
            color: var(--color-accent);
        }
        .card .card-link {
            display: inline-block;
            margin-top: 14px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--color-primary);
            text-decoration: none;
            transition: color var(--transition);
        }
        .card .card-link:hover {
            color: var(--color-primary-dark);
            text-decoration: underline;
        }

        /* ========== Skill Matrix ========== */
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .skill-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 18px 20px;
            transition: all var(--transition);
        }
        .skill-item:hover {
            border-color: var(--color-primary);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px var(--color-shadow);
        }
        .skill-item .skill-name {
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .skill-item .skill-name .level {
            font-weight: 400;
            color: var(--color-text-muted);
            font-size: 0.75rem;
        }
        .skill-bar {
            height: 5px;
            background: var(--color-border);
            border-radius: 6px;
            overflow: hidden;
        }
        .skill-bar .fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light));
            transition: width 0.7s ease;
            width: 0;
        }

        /* ========== Education & Cert ========== */
        .edu-cert-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }
        .edu-item,
        .cert-item {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 26px 28px;
            transition: all var(--transition);
        }
        .edu-item:hover,
        .cert-item:hover {
            border-color: var(--color-primary);
            transform: translateY(-4px);
            box-shadow: 0 10px 32px var(--color-shadow);
        }
        .edu-item .school {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .edu-item .major {
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }
        .edu-item .date {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }
        .edu-item .desc {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            margin-top: 10px;
            line-height: 1.6;
        }
        .cert-item .cert-name {
            font-weight: 600;
            font-size: 1rem;
        }
        .cert-item .cert-org {
            color: var(--color-text-secondary);
            font-size: 0.85rem;
        }
        .cert-item .cert-date {
            font-size: 0.78rem;
            color: var(--color-text-muted);
            margin-top: 4px;
        }

        @media (max-width: 700px) {
            .edu-cert-grid {
                grid-template-columns: 1fr;
            }
            .card-grid {
                grid-template-columns: 1fr;
            }
            .skill-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 450px) {
            .skill-grid {
                grid-template-columns: 1fr;
            }
            .highlights-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* ========== Footer ========== */
        .footer {
            padding: 36px 0 32px;
            border-top: 1px solid var(--color-border);
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }
        .footer .heart {
            color: var(--color-primary);
        }
        .footer .update {
            font-size: 0.7rem;
        }

        /* ========== Back to Top ========== */
        .back-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--color-primary);
            color: #fff;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 24px var(--color-shadow);
            transition: all var(--transition);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .back-top:hover {
            transform: translateY(-6px) scale(1.05);
            background: var(--color-primary-dark);
        }

        /* ========== Print ========== */
        @media print {
            body { padding-top: 0 !important; background: #fff !important; color: #000 !important; }
            .navbar { display: none !important; }
            .back-top { display: none !important; }
            .section { padding: 28px 0 !important; break-inside: avoid; border-bottom-color: #ddd !important; }
            .card, .edu-item, .cert-item, .highlight-item, .skill-item, .hero-quote {
                background: #fafafa !important; border-color: #ddd !important; box-shadow: none !important; transform: none !important;
            }
            .hero-grid { display: block !important; }
            .hero-visual { display: none !important; }
            .hero-quote { max-width: 100% !important; margin-top: 16px !important; }
            .tabs-nav button[aria-selected="true"] { background: #6C3B9A !important; color: #fff !important; }
            .tabs-nav button { color: #333 !important; border-color: #ddd !important; }
            .tabs-panel { display: block !important; }
            .tabs-panel[aria-hidden="true"] { display: none !important; }
            .tabs-panel[aria-hidden="false"] { display: block !important; }
            .hero-contact .primary { background: #6C3B9A !important; color: #fff !important; }
            .skill-bar .fill { background: #6C3B9A !important; }
            .section-title::after { background: #ddd !important; }
            .footer { border-top-color: #ddd !important; }
            .card-grid, .skill-grid, .highlights-grid { grid-template-columns: 1fr 1fr !important; }
            .edu-cert-grid { grid-template-columns: 1fr 1fr !important; }
            [data-theme="dark"] .card, [data-theme="dark"] .edu-item, [data-theme="dark"] .cert-item,

        function renderSkillsTabs() {

            nav.setAttribute('role', 'tablist');

            resume.skills.forEach((skill, idx) => {

                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', idx === 0 ? 'true' : 'false');
                btn.setAttribute('aria-controls', `skill-panel-${skill.id}`);
                btn.setAttribute('id', `skill-tab-${skill.id}`);
                btn.textContent = skill.label;
                btn.addEventListener('click', () => switchTab('skills', skill.id, idx));
                btn.addEventListener('keydown', (e) => {
                    const tabs = nav.querySelectorAll('button');
                    const current = Array.from(tabs).indexOf(e.target);
                    let next = current;
                    if (e.key === 'ArrowRight') { next = (current + 1) % tabs.length;
                        e.preventDefault(); }
                    if (e.key === 'ArrowLeft') { next = (current - 1 + tabs.length) % tabs.length;
                        e.preventDefault(); }
                    if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                        tabs[next].click();
                        tabs[next].focus();
                    }
                });
                nav.appendChild(btn);

                const panel = document.createElement('div');

            const stored = localStorage.getItem('theme') || 'light';
            const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const theme = stored === 'dark' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌓';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('themeToggle').textContent = next === 'dark' ? '☀️' : '🌓';
        }

        // ================================================================
        //  PRINT
        // ================================================================
        function printPage() {
            window.print();
        }

        // ================================================================
        //  BACK TO TOP
        // ================================================================
        function initBackTop() {
            const btn = document.getElementById('backTop');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 400) {
                    btn.classList.add('visible');
                } else {
                    btn.classList.remove('visible');
                }
            });
            btn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ================================================================
        //  MOBILE NAV
        // ================================================================
        function initMobileNav() {
            const toggle = document.getElementById('navToggle');
            const links = document.getElementById('navLinks');
            toggle.addEventListener('click', () => {
                const open = links.classList.toggle('open');
                toggle.setAttribute('aria-expanded', open);
            });
            links.querySelectorAll('a').forEach(a => {
                a.addEventListener('click', () => {
                    links.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                });
            });
        }

        // ================================================================
        //  INIT
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            renderHero();
            renderHighlights();
            renderSkillsTabs();
            renderProjectsTabs();
            renderSkillMatrix();
            renderEduCert();
            initTheme();
            initBackTop();
            initMobileNav();

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('printBtn').addEventListener('click', printPage);

            document.querySelectorAll('.navbar-links a').forEach(a => {
                a.addEventListener('click', (e) => {
                    const target = document.querySelector(a.getAttribute('href'));
                    if (target) {
                        e.preventDefault();
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });
        });
    </script>
</body>
</html>
